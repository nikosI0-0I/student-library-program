<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTU Library Dashboard</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #1e1e2e; 
            color: #cdd6f4; 
            margin: 20px; 
        }
        .dashboard { 
            display: grid; 
            grid-template-columns: 250px 1fr; 
            gap: 20px; 
        }
        .sidebar { 
            background: #11111b; 
            padding: 20px; 
            border-radius: 10px; 
        }
        .btn { 
            display: block; 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border: none; 
            background: #89b4fa; 
            color: #11111b; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            text-align: left;
        }
        .btn:hover { 
            background: #b4befe; 
        }
        .main-panel { 
            background: #181825; 
            padding: 20px; 
            border-radius: 10px; 
            border: 1px solid #313244; 
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            background: #313244;
            margin: 8px 0;
            padding: 12px;
            border-radius: 6px;
            border-left: 4px solid #89b4fa;
        }
        .error-box {
            color: #f38ba8; 
            background: #313244; 
            padding: 15px; 
            border-radius: 6px; 
            border: 1px solid #f38ba8;
        }
        .success-text {
            color: #a6e3a1;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="sidebar">
            <h3>📚 RTU Library</h3>
            <button class="btn" onclick="fetchCatalog()">🔍 Browse Catalog</button>
            <button class="btn" onclick="openBorrowModal()">📥 Borrow Item</button>
            <button class="btn" onclick="openReturnModal()">📤 Return Item</button>
            <button class="btn" onclick="fetchDashboard()">👤 My Account</button>
        </div>

        <div class="main-panel">
            <h2>Live Inventory Console</h2>
            <hr style="border-color: #313244;">
            <div id="display-output">Click a menu action to query the C++ controller database...</div>
        </div>
    </div>

    <script>
        const backendUrl = 'http://localhost:18080';

        // 1. Fetch Catalog Engine
        async function fetchCatalog() {
            const outputDiv = document.getElementById('display-output');
            outputDiv.innerHTML = "<em>Connecting to C++ backend server...</em>";
            try {
                const response = await fetch(`${backendUrl}/api/catalog`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }

                const data = await response.json();
                if (data.length === 0) {
                    outputDiv.innerHTML = "<p>The library catalog is currently empty inside the C++ map storage.</p>";
                    return;
                }

                let htmlList = "<h3>Current Stock:</h3><ul>";
                data.forEach(item => {
                    htmlList += `<li><strong>ID:</strong> ${item.id} | <strong>Title:</strong> "${item.title}"</li>`;
                });
                htmlList += "</ul>";
                outputDiv.innerHTML = htmlList;
            } catch (error) {
                showError(outputDiv);
            }
        }

        // 2. Dynamic Borrow Action
        async function openBorrowModal() {
            const studentId = prompt("Enter Student ID (e.g., RTU101):");
            if (!studentId) return;
            const bookId = prompt("Enter Book ID to borrow (e.g., B01):");
            if (!bookId) return;

            const outputDiv = document.getElementById('display-output');
            outputDiv.innerHTML = "<em>Processing transaction...</em>";
            try {
                const response = await fetch(`${backendUrl}/api/borrow/${studentId}/${bookId}`);
                const result = await response.json();
                
                outputDiv.innerHTML = `
                    <h3>📥 Borrow Status</h3>
                    <p class="success-text">${result.message}</p>
                    <p>Check your active C++ terminal/console window to see detailed transaction printouts and real-time validations!</p>
                `;
            } catch (error) {
                showError(outputDiv);
            }
        }

        // 3. Dynamic Return Action
        async function openReturnModal() {
            const studentId = prompt("Enter Student ID (e.g., RTU101):");
            if (!studentId) return;
            const bookId = prompt("Enter Book ID to return (e.g., B01):");
            if (!bookId) return;

            const outputDiv = document.getElementById('display-output');
            outputDiv.innerHTML = "<em>Processing transaction...</em>";
            try {
                const response = await fetch(`${backendUrl}/api/return/${studentId}/${bookId}`);
                const result = await response.json();
                
                outputDiv.innerHTML = `
                    <h3>📤 Return Status</h3>
                    <p class="success-text">${result.message}</p>
                    <p>Check your active C++ terminal/console window to verify validation and internal map modification results!</p>
                `;
            } catch (error) {
                showError(outputDiv);
            }
        }

        // 4. Student Profile Dashboard Console view
        function fetchDashboard() {
            document.getElementById('display-output').innerHTML = `
                <h3>👤 Student Profile Console</h3>
                <p><strong>Active Session:</strong> RTU101 - Nihat Ersishen</p>
                <p style="color: #b4befe;">Metrics and tracking logs print context directly to your hosting backend terminal environment automatically.</p>
            `;
        }

        // Helper function for clean error displays
        function showError(element) {
            element.innerHTML = `
                <div class="error-box">
                    <strong>❌ Connection Error:</strong> Could not reach the C++ Crow API.<br>
                    <small>Please ensure your compiled backend <code>main.exe</code> program is actively running on port 18080.</small>
                </div>`;
        }
    </script>
</body>
</html>
